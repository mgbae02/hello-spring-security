<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    </div>
</nav>

<div class="container" style="max-width: 520px;">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">비밀번호 변경</h4>
        <small class="text-muted">현재 비밀번호 확인 후 변경됩니다</small>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">현재 비밀번호</label>
                    <input type="password" class="form-control" th:field="*{currentPassword}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">새 비밀번호 (8자 이상)</label>
                    <input type="password" class="form-control" th:field="*{newPassword}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">새 비밀번호 확인</label>
                    <input type="password" class="form-control" th:field="*{confirmPassword}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">비밀번호 변경</button>
                    <a th:href="@{/home}" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- 실습 증적: 일시/학번/성명 -->
<footer class="text-center text-muted py-3 mt-4">
    <p class="mb-0"
       th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd (E) HH:mm:ss') + ' │ 학번: 2171181 │ 성명: 배민규'}"></p>
</footer>
</body>
</html>
